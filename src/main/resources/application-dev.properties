# Clerk development instance (https://dashboard.clerk.com → API keys)
# Activate with: SPRING_PROFILES_ACTIVE=dev (or -Dspring.profiles.active=dev)

# --- Clerk authentication (dev instance) ---
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URI:https://prepared-mallard-25.clerk.accounts.dev/.well-known/jwks.json}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER:https://prepared-mallard-25.clerk.accounts.dev}

onlyclimb.clerk.issuer=${CLERK_ISSUER:https://prepared-mallard-25.clerk.accounts.dev}
onlyclimb.clerk.jwks-uri=${CLERK_JWKS_URI:https://prepared-mallard-25.clerk.accounts.dev/.well-known/jwks.json}
# Webhook signing secret (whsec_*) must be provided via environment.
onlyclimb.clerk.webhook-signing-secret=${CLERK_WEBHOOK_SECRET:}
# Backend API secret key (sk_test_*). Override via CLERK_SECRET_KEY in CI/shared envs.
onlyclimb.clerk.secret-key=${CLERK_SECRET_KEY:sk_test_0UmcfCdqEFturidXkflmix0fmM9csCbWzA0tWOjRhX}
